<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="Listen to Trembling by Red Camellia."
    >

    <title>Trembling — Red Camellia</title>

    <link rel="icon" type="image/x-icon" href="/favicon/favicon.ico?v=2">
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon/favicon-96x96.png?v=2">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png?v=2">
    <meta name="theme-color" content="#111111">

    <link rel="stylesheet" href="css/style.css">

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    >

</head>

<body class="streaming-page">

    <main class="streaming-main">

        <a
            class="streaming-wordmark"
            href="index.html"
            aria-label="Return to the Red Camellia website"
        >

            <img
                src="images/logos/wordmark-white.png"
                alt="Red Camellia"
            >

        </a>

        <section class="streaming-card">

            <img
                class="streaming-artwork"
                src="images/artwork/trembling-cover.jpg"
                alt="Trembling single artwork"
            >

            <p class="streaming-kicker">
                Debut Single
            </p>

            <p class="streaming-status">
                Out Now
            </p>

            <p class="streaming-subtitle">
                Available on
            </p>

            <div class="streaming-links">

                <a
                    class="streaming-link"
                    href="https://open.spotify.com/album/3qPNAlutxHnJafWWWRL7Qb?si=fTEB74wFSzaJxukLM4Nuvg"
                    target="_blank"
                    rel="noopener noreferrer"
                >

                    <span>
                        <i
                            class="fa-brands fa-spotify"
                            aria-hidden="true"
                        ></i>

                        Spotify
                    </span>

                    <span class="streaming-action">
                        Play
                    </span>

                </a>

                <a
                    class="streaming-link"
                    href="https://music.apple.com/us/album/trembling-single/1870232757"
                    target="_blank"
                    rel="noopener noreferrer"
                >

                    <span>
                        <i
                            class="fa-brands fa-apple"
                            aria-hidden="true"
                        ></i>

                        Apple Music
                    </span>

                    <span class="streaming-action">
                        Play
                    </span>

                </a>

                <a
                    class="streaming-link"
                    href="https://www.youtube.com/watch?v=RBBqYDD9Y9Y"
                    target="_blank"
                    rel="noopener noreferrer"
                >

                    <span>
                        <i
                            class="fa-brands fa-youtube"
                            aria-hidden="true"
                        ></i>

                        YouTube
                    </span>

                    <span class="streaming-action">
                        Watch
                    </span>

                </a>

                <a
                    class="streaming-link"
                    href="https://www.abc.net.au/triplejunearthed/artist/red-camellia"
                    target="_blank"
                    rel="noopener noreferrer"
                >

                    <span>
                        <i
                            class="fa-solid fa-radio"
                            aria-hidden="true"
                        ></i>

                        Triple J Unearthed
                    </span>

                    <span class="streaming-action">
                        Listen
                    </span>

                </a>

            </div>

            <div class="streaming-socials">

                <p class="streaming-socials-heading">
                    Follow Red Camellia
                </p>

                <div class="streaming-social-icons">

                    <a
                        href="https://www.instagram.com/redcamelliaband/"
                        target="_blank"
                        rel="noopener noreferrer"
                        aria-label="Red Camellia on Instagram"
                    >
                        <i
                            class="fa-brands fa-instagram"
                            aria-hidden="true"
                        ></i>
                    </a>

                    <a
                        href="https://www.tiktok.com/@redcamelliaband"
                        target="_blank"
                        rel="noopener noreferrer"
                        aria-label="Red Camellia on TikTok"
                    >
                        <i
                            class="fa-brands fa-tiktok"
                            aria-hidden="true"
                        ></i>
                    </a>

                    <a
                        href="https://open.spotify.com/artist/2v7xfNq7JK9akvSWFZvmOX?si=IgLIqgGKTV2yJXPdZQ3G4A"
                        target="_blank"
                        rel="noopener noreferrer"
                        aria-label="Red Camellia on Spotify"
                    >
                        <i
                            class="fa-brands fa-spotify"
                            aria-hidden="true"
                        ></i>
                    </a>

                    <a
                        href="https://music.apple.com/us/artist/red-camellia/1870162665"
                        target="_blank"
                        rel="noopener noreferrer"
                        aria-label="Red Camellia on Apple Music"
                    >
                        <i
                            class="fa-brands fa-apple"
                            aria-hidden="true"
                        ></i>
                    </a>

                    <a
                        href="https://www.youtube.com/@RedCamelliaBand"
                        target="_blank"
                        rel="noopener noreferrer"
                        aria-label="Red Camellia on YouTube"
                    >
                        <i
                            class="fa-brands fa-youtube"
                            aria-hidden="true"
                        ></i>
                    </a>

                </div>

            </div>

            <a
                class="streaming-back"
                href="index.html"
            >
                Back to Official Site
            </a>

        </section>

    </main>

</body>

</html>
